<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scroll of Knowledge — Article Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0; padding: 0;
    background: radial-gradient(ellipse at 50% 30%, #1b1438 0%, #0d0a1f 60%, #070512 100%);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  .stage { width: min(1280px, 98vw); }
  svg { width: 100%; height: auto; display: block; }

  /* ---- clickable banner behaviour ---- */
  .scroll-link { cursor: pointer; }
  /* hover cue: glow only — no movement, no transition */
  .scroll-link:hover .banner,
  .scroll-link:focus .banner { filter: brightness(1.15) drop-shadow(0 0 14px rgba(120,170,255,.7)); }
  .scroll-link:focus { outline: none; }

  /* sparkles are static */
  .tw, .tw2, .tw3 { opacity: .8; }
</style>
</head>
<body>
<div class="stage">
<svg viewBox="0 0 1280 880" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img" aria-label="A glowing magical scroll with four action banners">

  <defs>
    <!-- ===================== gradients ===================== -->
    <radialGradient id="bgGlow" cx="35%" cy="45%" r="75%">
      <stop offset="0%"  stop-color="#241a4e"/>
      <stop offset="55%" stop-color="#140f30"/>
      <stop offset="100%" stop-color="#0a0718"/>
    </radialGradient>

    <linearGradient id="bronze" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#f2c89a"/>
      <stop offset="28%" stop-color="#d99e6b"/>
      <stop offset="60%" stop-color="#b4774a"/>
      <stop offset="100%" stop-color="#8a5634"/>
    </linearGradient>
    <linearGradient id="bronzeV" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#f2c89a"/>
      <stop offset="30%" stop-color="#d99e6b"/>
      <stop offset="65%" stop-color="#b4774a"/>
      <stop offset="100%" stop-color="#8a5634"/>
    </linearGradient>
    <linearGradient id="bronzeCap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#fadfb9"/>
      <stop offset="50%" stop-color="#cf9258"/>
      <stop offset="100%" stop-color="#7c4c2c"/>
    </linearGradient>

    <linearGradient id="parchment" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0%"  stop-color="#f7e3d4"/>
      <stop offset="40%" stop-color="#f3cfd2"/>
      <stop offset="75%" stop-color="#ecb9d8"/>
      <stop offset="100%" stop-color="#e3a9e6"/>
    </linearGradient>
    <linearGradient id="parchSmall" x1="0" y1="0" x2="1" y2="0.6">
      <stop offset="0%"  stop-color="#f7e3d4"/>
      <stop offset="55%" stop-color="#f1c8d6"/>
      <stop offset="100%" stop-color="#e8b1e0"/>
    </linearGradient>

    <radialGradient id="pinkGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#ffd2f2" stop-opacity=".95"/>
      <stop offset="35%" stop-color="#ff7ad9" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#ff5ad0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blueGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#cfe6ff" stop-opacity=".9"/>
      <stop offset="40%" stop-color="#3f8cff" stop-opacity=".45"/>
      <stop offset="100%" stop-color="#3f8cff" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="threadGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#ffd9a0"/>
      <stop offset="50%" stop-color="#b08cff"/>
      <stop offset="100%" stop-color="#7ec3ff"/>
    </linearGradient>

    <!-- ===================== filters ===================== -->
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dropSh" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.55"/>
    </filter>

    <!-- 4-point sparkle -->
    <path id="spark" d="M0,-14 C1.5,-4 4,-1.5 14,0 C4,1.5 1.5,4 0,14 C-1.5,4 -4,1.5 -14,0 C-4,-1.5 -1.5,-4 0,-14 Z"/>

    <!-- ===================== small scroll banner ===================== -->
    <g id="banner-shape">
      <!-- back shadow of ribbon -->
      <path d="M24,20 Q150,12 276,20 L276,76 Q150,84 24,76 Z" fill="#5b3a22" opacity=".5" transform="translate(0,4)"/>
      <!-- left roller -->
      <g>
        <rect x="0" y="6" width="26" height="86" rx="12" fill="url(#bronzeV)" stroke="#5e3a1f" stroke-width="2"/>
        <ellipse cx="13" cy="10" rx="11" ry="5" fill="#fadfb9" stroke="#5e3a1f" stroke-width="1.5"/>
        <ellipse cx="13" cy="88" rx="11" ry="5" fill="#9a6238" stroke="#5e3a1f" stroke-width="1.5"/>
        <path d="M6,22 q4,8 0,18" stroke="#fff3df" stroke-width="2" fill="none" opacity=".7"/>
      </g>
      <!-- right roller -->
      <g transform="translate(274,0)">
        <rect x="0" y="6" width="26" height="86" rx="12" fill="url(#bronzeV)" stroke="#5e3a1f" stroke-width="2"/>
        <ellipse cx="13" cy="10" rx="11" ry="5" fill="#fadfb9" stroke="#5e3a1f" stroke-width="1.5"/>
        <ellipse cx="13" cy="88" rx="11" ry="5" fill="#9a6238" stroke="#5e3a1f" stroke-width="1.5"/>
        <path d="M6,22 q4,8 0,18" stroke="#fff3df" stroke-width="2" fill="none" opacity=".7"/>
      </g>
      <!-- parchment ribbon -->
      <path d="M22,18 Q150,9 278,18 L278,78 Q150,87 22,78 Z"
            fill="url(#parchSmall)" stroke="#5e3a1f" stroke-width="2.5"/>
      <!-- inner trim -->
      <path d="M34,26 Q150,19 266,26 L266,70 Q150,77 34,70 Z"
            fill="none" stroke="#8a5634" stroke-width="1.4" opacity=".55"/>
      <!-- tiny gem -->
      <path d="M150,21 l5,4 -5,4 -5,-4 Z" fill="#3fb7ff" stroke="#1d3f8f" stroke-width="1"/>
    </g>
  </defs>

  <!-- =============================== BACKGROUND =============================== -->
  <rect width="1280" height="880" fill="url(#bgGlow)"/>

  <rect x="22" y="22" width="1236" height="836" rx="14" fill="none" stroke="#2f2a66" stroke-width="3"/>

    <g transform="translate(0,880) scale(1,-1)"><path d="M40,120 q0,-80 80,-80 M52,150 q0,-98 98,-98 M64,96 q10,-32 32,-32"/></g>
    <g transform="translate(1280,880) scale(-1,-1)"><path d="M40,120 q0,-80 80,-80 M52,150 q0,-98 98,-98 M64,96 q10,-32 32,-32"/></g>

    <circle cx="620" cy="820" r="3"  fill="#cfe6ff" opacity=".8" class="tw3"/>

    <use href="#spark" x="0" y="0" transform="translate(1215,470) scale(0.8)" fill="#9fd1ff" filter="url(#bigGlow)" class="tw3"/>
    <use href="#spark" x="0" y="0" transform="translate(90,250) scale(0.9)" fill="#cfa6ff" filter="url(#bigGlow)" class="tw2"/>
  </g>

  <!-- =============================== BIG SCROLL =============================== -->
  <g transform="translate(60,30)" filter="url(#dropSh)">

    <!-- top finial -->
    <g>
      <path d="M215,0 L150,52 L280,52 Z" fill="url(#bronzeCap)" stroke="#5e3a1f" stroke-width="2.5"/>
      <rect x="196" y="6" width="38" height="52" rx="6" fill="url(#bronzeV)" stroke="#5e3a1f" stroke-width="2.5"/>
      <path d="M215,22 l6,9 -6,9 -6,-9 Z" fill="#2a2150" stroke="#15102e" stroke-width="1.5"/>
    </g>

    <!-- top roller -->

    </g>
